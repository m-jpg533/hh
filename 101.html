<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok 播放器</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    height:100vh;
}

/* ===== 滑動容器 ===== */
.container{
    width:100vw;
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

/* 每一頁影片 */
.page{
    width:100vw;
    height:100vh;
    position:relative;
    scroll-snap-align:start;
}

/* 影片 */
video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 點擊開聲音 */
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:18px;
    background:rgba(0,0,0,0.3);
    cursor:pointer;
}

/* 底部廣告 */
#ad{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:70px;
    background:black;
    z-index:9999;
}

#ad video{
    width:100%;
    height:100%;
    object-fit:contain;
}

#close{
    position:absolute;
    right:10px;
    top:5px;
    width:28px;
    height:28px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
    z-index:10000;
}

</style>
</head>

<body>

<!-- ===== TikTok 主體 ===== -->
<div class="container">

    <!-- 影片1 -->
    <div class="page">
        <video class="vid" muted autoplay loop playsinline>
            <source src="https://m-jpg533.github.io/hh/100.mp4">
        </video>
        <div class="overlay">點一下開聲音</div>
    </div>

    <!-- 影片2 -->
    <div class="page">
        <video class="vid" muted autoplay loop playsinline>
            <source src="https://m-jpg533.github.io/hh/101.mp4">
        </video>
        <div class="overlay"></div>
    </div>

</div>

<!-- ===== 底部廣告 ===== -->
<div id="ad">

    <button id="close">×</button>

    <video autoplay muted loop playsinline>
        <source src="https://m-jpg533.github.io/hh/101.mp4">
    </video>

</div>

<script>

let videos = document.querySelectorAll(".vid");
let overlays = document.querySelectorAll(".overlay");

/* 點擊開聲音 */
overlays.forEach((ov, i) => {

    ov.addEventListener("click", () => {

        ov.style.display = "none";
        videos[i].muted = false;
        videos[i].play();

    });

});

/* 廣告關閉 */
document.getElementById("close").onclick = () => {
    document.getElementById("ad").style.display = "none";
};

</script>

</body>
</html>
