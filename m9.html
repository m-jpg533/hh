
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pre-roll 廣告（手機修正版）</title>

<style>

body{
    margin:0;
    background:black;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== 容器 ===== */
.player{
    width:100%;
    max-width:650px;
    position:relative;
}

/* ===== 廣告影片 ===== */
#adVideo{
    width:100%;
    height:auto;
    border-radius:18px;
}

/* ===== YouTube ===== */
#mainVideo{
    width:100%;
    height:60vh;
    border:none;
    border-radius:18px;
    display:none;
}

/* ===== 按鈕 ===== */
#startBtn{
    position:absolute;
    z-index:9999;
    padding:16px 35px;
    font-size:22px;
    border:none;
    border-radius:12px;
    background:#ffcc00;
    font-weight:bold;
    cursor:pointer;
}

/* ===== 跳過 ===== */
#skipBtn{
    position:absolute;
    top:10px;
    right:10px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    cursor:pointer;
    display:none;
    z-index:9999;
}

/* ===== 廣告文字 ===== */
#adText{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:6px 12px;
    border-radius:10px;
    display:none;
    z-index:9999;
}

</style>
</head>

<body>

<div class="player">

<!-- 開始 -->
<button id="startBtn">▶ 點擊播放</button>

<!-- 廣告文字 -->
<div id="adText">廣告播放中...</div>

<!-- 跳過 -->
<button id="skipBtn">跳過</button>

<!-- 廣告影片 -->

<video id="adVideo" playsinline>
    <source src="https://m-jpg533.github.io/hh/68.mp4">
</video>

<!-- 主影片（YouTube） -->
<iframe
id="mainVideo"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

<script>

const startBtn = document.getElementById("startBtn");
const adVideo = document.getElementById("adVideo");
const mainVideo = document.getElementById("mainVideo");
const skipBtn = document.getElementById("skipBtn");
const adText = document.getElementById("adText");

/* 開始播放 */
startBtn.addEventListener("click", async () => {

    startBtn.style.display = "none";

    skipBtn.style.display = "block";
    adText.style.display = "block";

    // 解除靜音
    adVideo.muted = false;

    try{
        await adVideo.play();
    }catch(e){
        console.log(e);
    }



});

/* 廣告結束 */
adVideo.addEventListener("ended", () => {
    startMain();
});

/* 跳過 */
skipBtn.onclick = () => {
    adVideo.pause();
    startMain();
};

/* 開主影片 */
function startMain(){

    adVideo.style.display = "none";
    skipBtn.style.display = "none";
    adText.style.display = "none";

    mainVideo.style.display = "block";

    mainVideo.src =
    "https://www.youtube.com/embed/xKVwHHN5bQs?autoplay=1";

}

</script>

</body>
</html>
