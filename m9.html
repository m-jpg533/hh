<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Pre-roll 廣告</title>

<style>

body{
    margin:0;
    background:black;
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 共用 */
video,
iframe{
    width:100%;
    max-width:480px;
    height:350px;
    border:none;
    border-radius:18px;
    background:black;
}

/* 主影片先隱藏 */
#mainVideo{
    display:none;
}

/* 開始按鈕 */
#startBtn{
    position:absolute;
    z-index:9999;
    padding:16px 35px;
    font-size:22px;
    border:none;
    border-radius:12px;
    background:#ffcc00;
    font-weight:bold;
    cursor:pointer;
}

/* 跳過 */
#skipBtn{
    position:absolute;
    top:20px;
    right:20px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    cursor:pointer;
    display:none;
    z-index:9999;
}

/* 廣告文字 */
#adText{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:8px 15px;
    border-radius:10px;
    display:none;
    z-index:9999;
}

</style>
</head>

<body>

<!-- 開始 -->
<button id="startBtn">
▶ 點擊播放
</button>

<!-- 廣告文字 -->
<div id="adText">
廣告播放中...
</div>

<!-- 跳過 -->
<button id="skipBtn">
跳過廣告
</button>

<!-- 廣告影片 -->
<video
id="adVideo"
playsinline
webkit-playsinline
preload="auto">

    <source
    src="https://m-jpg533.github.io/hh/68.mp4"
    type="video/mp4">

</video>

<!-- 主影片 -->
<iframe
id="mainVideo"
src=""
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<script>

/* 元件 */
const startBtn = document.getElementById("startBtn");
const adVideo = document.getElementById("adVideo");
const mainVideo = document.getElementById("mainVideo");
const skipBtn = document.getElementById("skipBtn");
const adText = document.getElementById("adText");

/* 開始 */
startBtn.addEventListener("click", async () => {

    startBtn.style.display = "none";

    skipBtn.style.display = "block";
    adText.style.display = "block";

    try{

        await adVideo.play();

    }catch(err){

        console.log(err);

    }

});

/* 廣告播完 */
adVideo.addEventListener("ended", () => {

    startMainVideo();

});

/* 跳過 */
skipBtn.addEventListener("click", () => {

    adVideo.pause();

    startMainVideo();

});

/* 開主影片 */
function startMainVideo(){

    /* 隱藏廣告 */
    adVideo.style.display = "none";

    skipBtn.style.display = "none";

    adText.style.display = "none";

    /* 顯示 YouTube */
    mainVideo.style.display = "block";

    /* ⭐ autoplay */
    mainVideo.src =
    "https://www.youtube.com/embed/xKVwHHN5bQs?autoplay=1";

}

</script>

</body>
</html>
