<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>AI 虛擬龍蝦水族箱 - LINE大頭貼風</title>
<style>
body { font-family: Arial; text-align: center; background: #a0e0ff; overflow: hidden; }
#tank { width: 800px; height: 400px; margin: 20px auto; background: #1a8cff; position: relative; border-radius: 10px; overflow: hidden; cursor: pointer; }
.lobster { width: 60px; position: absolute; bottom: 20px; transition: left 0.5s, bottom 0.5s; animation: clawMove 0.5s infinite alternate; z-index:2; }
.food { width: 20px; position: absolute; top: 0; z-index:1; }
/* 狀態條 */
.status { margin: 5px; display: inline-block; text-align: left; }
.bar { width: 200px; height: 15px; background: #ccc; margin: 5px 0; border-radius: 5px; position: relative; }
.fill { height: 100%; background: #ff5555; width: 0%; border-radius: 5px; }
/* 爪子揮動 */
@keyframes clawMove {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(10deg); }
  100% { transform: rotate(-10deg); }
}
/* 背景水波動畫 */
#wave { position: absolute; width: 200%; height: 100%; background: radial-gradient(circle, rgba(255,255,255,0.2) 10%, transparent 10%); background-size: 50px 50px; animation: waveMove 4s linear infinite; z-index:0; }
@keyframes waveMove {
  0% { background-position: 0 0; }
  100% { background-position: 100px 0; }
}
</style>
</head>
<body>

<h1>AI 虛擬龍蝦水族箱 🦞</h1>
<div id="tank">
  <div id="wave"></div>
</div>
<div id="statusContainer"></div>

<script>
const tank = document.getElementById('tank');
const statusContainer = document.getElementById('statusContainer');

class Lobster {
  constructor(name,imgSrc,initX){
    this.name = name;
    this.hunger = Math.floor(Math.random()*30);
    this.health = 100;
    this.growth = 0;
    this.x = initX;
    this.y = 20;
    this.elem = document.createElement('img');
    this.elem.src = imgSrc;
    this.elem.className = 'lobster';
    this.elem.style.left = this.x+'px';
    this.elem.style.bottom = this.y+'px';
    tank.appendChild(this.elem);

    this.statusDiv = document.createElement('div');
    this.statusDiv.className = 'status';
    this.statusDiv.innerHTML = `<strong>${this.name}</strong>
    <div class="bar"><div class="fill hunger"></div></div>
    <div class="bar"><div class="fill health"></div></div>
    <div class="bar"><div class="fill growth"></div></div>`;
    statusContainer.appendChild(this.statusDiv);
    this.hungerBar = this.statusDiv.querySelector('.hunger');
    this.healthBar = this.statusDiv.querySelector('.health');
    this.growthBar = this.statusDiv.querySelector('.growth');
  }

  updateBars(){
    this.hungerBar.style.width = this.hunger+'%';
    this.healthBar.style.width = this.health+'%';
    this.growthBar.style.width = this.growth+'%';
  }

  moveTowards(food){
    if(!food) return;
    const fx = parseFloat(food.style.left);
    const fy = parseFloat(food.style.top);
    const dist = Math.hypot(this.x - fx, this.y - (400-fy));
    if(dist>5){
      this.x += (fx-this.x)*0.05;
      this.elem.style.left = this.x+'px';
    }
    if(dist<30){ 
      this.hunger -=30;
      if(this.hunger<0) this.hunger=0;
      this.growth +=5;
      if(this.growth>100) this.growth=100;
      tank.removeChild(food);
      foodItems.splice(foodItems.indexOf(food),1);
    }
  }

  avoidOverlap(otherLobsters){
    for(let other of otherLobsters){
      if(other===this) continue;
      const dx = this.x - other.x;
      if(Math.abs(dx)<70){ 
        this.x += dx>0?1:-1;
        if(this.x<0) this.x=0;
        if(this.x>740) this.x=740;
        this.elem.style.left = this.x+'px';
      }
    }
  }

  roamRandomly(){
    this.x += (Math.random()-0.5)*5;
    if(this.x<0) this.x=0;
    if(this.x>740) this.x=740;
    this.elem.style.left = this.x+'px';
  }

  tick(foodItems,allLobsters){
    this.hunger += 2;
    if(this.hunger>100){ this.hunger=100; this.health-=2;}
    if(this.health>50){ this.growth +=1; if(this.growth>100) this.growth=100;}
    if(Math.random()<0.05){ this.health-=5; if(this.health<0) this.health=0;}
    let nearest = null;
    let dist = 1000;
    for(let f of foodItems){
      const fx = parseFloat(f.style.left);
      const fy = parseFloat(f.style.top);
      const d = Math.hypot(this.x - fx, this.y - (400-fy));
      if(d<dist){ nearest=f; dist=d; }
    }
    if(nearest) this.moveTowards(nearest);
    else this.roamRandomly();
    this.avoidOverlap(allLobsters);
    this.updateBars();
    this.elem.style.bottom = this.y+'px';
  }
}

// 初始化龍蝦，每隻拉開
const lobsters = [
  new Lobster('龍蝦1','https://m-jpg533.github.io/hh/red-lobster-cartoon-sticker.png',50),
  new Lobster('龍蝦2','https://m-jpg533.github.io/hh/red-lobster-cartoon-sticker.png',250),
  new Lobster('龍蝦3','https://m-jpg533.github.io/hh/red-lobster-cartoon-sticker.png',450)
];

let foodItems=[];

function dropFood(x=null){
  const food = document.createElement('img');
  food.src = 'https://i.imgur.com/B5C2d4u.png';
  food.className='food';
  food.style.left = x!==null ? x+'px' : Math.random()*780+'px';
  food.style.top = '0px';
  tank.appendChild(food);
  foodItems.push(food);
  let y=0;
  const fall = setInterval(()=>{
    y+=5;
    food.style.top = y+'px';
    if(y>380){ tank.removeChild(food); foodItems.splice(foodItems.indexOf(food),1); clearInterval(fall);}
  },50);
}

// 自動掉食物
setInterval(()=>{ dropFood(); },5000);

// 點擊投餵
tank.addEventListener('click',(e)=>{ dropFood(e.offsetX); });

// 每秒更新龍蝦狀態
setInterval(()=>{ lobsters.forEach(l=>l.tick(foodItems,lobsters)); },1000);

</script>
</body>
</html>
