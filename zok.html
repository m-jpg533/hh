<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 龍蝦手遊 Pro版</title>

<style>
body{margin:0;font-family:Arial;background:#0b3d91;color:white;text-align:center;}
#topUI{background:#022c6c;padding:10px;}
#tank{width:100%;height:60vh;background:linear-gradient(#1a8cff,#003366);position:relative;overflow:hidden;}
.lobster{position:absolute;bottom:10px;width:60px;}
.food{width:15px;height:15px;background:orange;border-radius:50%;position:absolute;}
.stat{position:absolute;font-size:12px;background:rgba(0,0,0,0.5);padding:3px;border-radius:5px;}
#controls{position:fixed;bottom:0;width:100%;background:#022c6c;padding:10px;}
button{padding:10px;margin:5px;font-size:16px;border-radius:10px;border:none;}
</style>
</head>

<body>

<div id="topUI">
💰<span id="money">0</span>　
🍗<span id="food">20</span>
<button onclick="buyFood()">🛒買食物(10$)</button>
<button onclick="shareLine()">📱分享LINE</button>
</div>

<div id="tank"></div>

<div id="controls">
<button onclick="feedMany()">🍗狂餵</button>
</div>

<!-- 🎵 音效 -->
<audio id="bgm" src="https://m-jpg533.github.io/flask-share/13.mp3.mp3" loop></audio>
<audio id="eatSound" src="eat.mp3"></audio>

<script>
const tank=document.getElementById("tank");
let foods=[],foodStock=20,money=0;

const foodUI=document.getElementById("food");
const moneyUI=document.getElementById("money");
const eatSound=document.getElementById("eatSound");
const bgm=document.getElementById("bgm");

// 🎵 點擊後播放（手機必要）
document.body.addEventListener("click", () => {
  bgm.play().catch(()=>{});
}, { once: true });

// 🎵 切背景 / 回來
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    bgm.pause();
  } else {
    bgm.play().catch(()=>{});
  }
});

// 🎵 關閉頁面
window.addEventListener("beforeunload", () => {
  bgm.pause();
});

// 🎵 手機補強
window.addEventListener("pagehide", () => {
  bgm.pause();
});

class Lobster{
  constructor(x){
    this.x=x;
    this.hunger=20;
    this.health=100;
    this.growth=0;
    this.power=1;
    this.dir=1;

    this.el=document.createElement("img");
    this.el.src="https://m-jpg533.github.io/hh/red-lobster-cartoon-sticker.png";
    this.el.className="lobster";
    tank.appendChild(this.el);

    this.stat=document.createElement("div");
    this.stat.className="stat";
    tank.appendChild(this.stat);
  }

  updateUI(){
    this.el.style.left=this.x+"px";
    this.el.style.transform=`scaleX(${this.dir})`;
    this.el.style.width=(60+this.growth*0.5)+"px";

    this.stat.style.left=this.x+"px";
    this.stat.style.bottom="80px";

    this.stat.innerHTML=
    `❤️${Math.floor(this.health)}<br>🍗${Math.floor(this.hunger)}`;
  }

  move(){
    let target=null,min=9999;

    foods.forEach(f=>{
      let d=Math.abs(f.x-this.x);
      if(d<min){min=d;target=f;}
    });

    if(target){
      this.dir=target.x>this.x?1:-1;

      let speed=0.03 + this.growth*0.001;
      this.x+=(target.x-this.x)*speed;

      let contenders=lobsters.filter(l=>Math.abs(l.x-target.x)<20);

      if(contenders.length>1){
        let strongest=contenders.sort((a,b)=>b.power-a.power)[0];
        if(strongest!==this){
          this.health-=2;
          return;
        }
      }

      if(Math.abs(this.x-target.x)<15){
        this.hunger-=30;
        this.health+=5;
        this.growth+=5;
        this.power+=1;
        money+=5;

        eatSound.currentTime=0;
        eatSound.play().catch(()=>{});

        target.el.remove();
        foods.splice(foods.indexOf(target),1);
      }

    }else{
      this.x+=(Math.random()-0.5)*3;
    }

    if(this.x<0)this.x=0;
    if(this.x>window.innerWidth-80)this.x=window.innerWidth-80;
  }

  tick(){
    this.hunger+=2;

    if(this.hunger>80)this.health-=2;
    if(this.hunger<40)this.health+=1;

    if(this.health<=0){
      this.el.style.opacity=0.2;
      return;
    }

    this.move();
    this.updateUI();
  }
}

// 初始化
let lobsters=[
  new Lobster(50),
  new Lobster(200),
  new Lobster(350)
];

// 掉食物
function dropFood(x){
  if(foodStock<=0)return;

  foodStock--;
  foodUI.innerText=foodStock;

  let f=document.createElement("div");
  f.className="food";
  f.style.left=x+"px";
  f.style.top="0px";
  tank.appendChild(f);

  let obj={el:f,x:x,y:0};
  foods.push(obj);

  let fall=setInterval(()=>{
    obj.y+=5;
    f.style.top=obj.y+"px";

    if(obj.y>tank.clientHeight){
      f.remove();
      foods.splice(foods.indexOf(obj),1);
      clearInterval(fall);
    }
  },30);
}

// 點擊餵食
tank.onclick=e=>dropFood(e.offsetX);

// 狂餵
function feedMany(){
  for(let i=0;i<10;i++){
    dropFood(Math.random()*window.innerWidth);
  }
}

// 商店
function buyFood(){
  if(money>=10){
    money-=10;
    foodStock+=10;
  }
}

// LINE分享
function shareLine(){
  let url=location.href;
  window.open(`https://social-plugins.line.me/lineit/share?url=${url}`);
}

// 主循環
setInterval(()=>{
  lobsters.forEach(l=>l.tick());
  foodUI.innerText=foodStock;
  moneyUI.innerText=money;
},800);

</script>

</body>
</html>
